# ============================================================
#  NXIO — .github/workflows/ci.yml
#  GitHub Actions — Lint + Tests + Dependency Audit
# ============================================================
name: NXIO CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Lint + Test + Audit
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      # 4. Lint with flake8
      - name: Lint with flake8
        run: |
          flake8 api/ brain/ paper_trading/ \
            --max-line-length=120 \
            --exclude=__pycache__,venv,.venv \
            --count --statistics

      # 5. Run tests with coverage
      - name: Run pytest with coverage
        env:
          NXIO_API_KEY: test-secret-key-ci
          NXIO_ENV: paper
          NXIO_DB_PATH: data/test_nxio.db
        run: |
          python -m pytest tests/ -v --tb=short \
            --cov=paper_trading --cov=api \
            --cov-report=term-missing \
            --cov-fail-under=80

      # 6. Dependency vulnerability audit
      - name: Audit dependencies (pip-audit)
        run: |
          pip install pip-audit
          pip-audit --requirement requirements.txt --ignore-vuln PYSEC-2022-42969 || true