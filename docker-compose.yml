# ============================================================
#  NXIO — docker-compose.yml
#  One-command startup
# ============================================================
version: "3.9"

services:
  nxio:
    build: .
    container_name: nxio-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data        # persist SQLite DB + processed data
      - ./brain/models:/app/brain/models  # persist trained models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3